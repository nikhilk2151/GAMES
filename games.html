<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#0a0a2e,#1a1a4e,#0d0d3b);color:#fff;min-height:100vh}
.hub{padding:20px;max-width:1200px;margin:0 auto}

.hub p.sub{text-align:center;color:#aaa;margin-bottom:30px;font-size:1.1rem}
.search{display:block;margin:0 auto 25px;padding:12px 20px;width:100%;max-width:400px;border-radius:25px;border:2px solid #333;background:#111;color:#fff;font-size:1rem;outline:none}
.search:focus{border-color:#7b2ff7}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}
.card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;cursor:pointer;transition:all .25s;text-align:center}
.card:hover{transform:translateY(-4px);background:rgba(255,255,255,0.12);border-color:#7b2ff7}
.card .icon{font-size:2.5rem;margin-bottom:10px}
.card .name{font-size:1rem;font-weight:600}
.card .cat{font-size:.75rem;color:#888;margin-top:5px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#1a1a3e;border-radius:20px;padding:30px;max-width:420px;width:90%;text-align:center;border:1px solid #333}
.modal h2{margin-bottom:8px;font-size:1.4rem}
.modal p{color:#aaa;margin-bottom:20px;font-size:.95rem}
.modal .players{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.modal .pbtn{width:55px;height:55px;border-radius:50%;border:2px solid #444;background:transparent;color:#fff;font-size:1.3rem;font-weight:700;cursor:pointer;transition:all .2s}
.modal .pbtn:hover,.modal .pbtn.sel{border-color:#7b2ff7;background:#7b2ff733}
.modal .go{padding:10px 40px;border:none;border-radius:25px;background:linear-gradient(135deg,#00d4ff,#7b2ff7);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;letter-spacing:1px}
.modal .go:hover{opacity:.85}
.modal .go:disabled{opacity:.4;cursor:default}
.back-btn{position:fixed;top:15px;left:15px;z-index:50;padding:8px 18px;border:none;border-radius:20px;background:#333;color:#fff;cursor:pointer;font-size:.9rem;display:none}
.back-btn:hover{background:#555}
#gameArea{display:none;padding:20px;max-width:900px;margin:0 auto;min-height:80vh}
#gameArea h2{text-align:center;margin-bottom:5px;font-size:1.5rem}
.turn-info{text-align:center;color:#f0c040;margin-bottom:15px;font-size:1.1rem;min-height:1.5em}
.scoreboard{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin-bottom:20px}
.scoreboard .ps{padding:6px 16px;border-radius:20px;font-weight:600;font-size:.9rem}
.game-board{display:flex;flex-direction:column;align-items:center;gap:10px}
.action-btn{padding:10px 30px;border:none;border-radius:20px;background:linear-gradient(135deg,#00d4ff,#7b2ff7);color:#fff;font-weight:600;cursor:pointer;font-size:1rem;margin:5px}
.action-btn:hover{opacity:.85}
.action-btn.secondary{background:#444}
.action-btn:disabled{opacity:.4;cursor:default}
.pcolors{--p1:#00d4ff;--p2:#ff6b6b;--p3:#4cff91;--p4:#ffd34e;--p5:#d46bff;--p6:#ff914d}
</style>
</head>

<script>
const PC=['#00d4ff','#ff6b6b','#4cff91','#ffd34e','#d46bff','#ff914d'];
const PN=['Player 1','Player 2','Player 3','Player 4','Player 5','Player 6'];
let selGame=null,selPlayers=0,scores=[],curPlayer=0,gameActive=false;

function $(id){return document.getElementById(id)}
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}

function makeScoreboard(){
  const sb=el('div','scoreboard');
  for(let i=0;i<selPlayers;i++){
    const s=el('div','ps',`${PN[i]}: <span id="sc${i}">${scores[i]}</span>`);
    s.style.background=PC[i]+'33';s.style.border=`2px solid ${PC[i]}`;s.id=`ps${i}`;
    sb.appendChild(s);
  }
  return sb;
}
function updateScore(i,v){scores[i]=v;const e=$(`sc${i}`);if(e)e.textContent=v}
function highlightPlayer(){
  for(let i=0;i<selPlayers;i++){
    const e=$(`ps${i}`);
    if(e)e.style.opacity=i===curPlayer?'1':'0.4';
  }
}
function nextPlayer(){curPlayer=(curPlayer+1)%selPlayers;highlightPlayer()}
function turnInfo(msg){const t=document.querySelector('.turn-info');if(t)t.textContent=msg}

const GAMES=[
{id:1,name:'Tic Tac Toe',icon:'❌⭕',cat:'Board',desc:'Classic 3x3 grid game',min:2,max:2,init:initTicTacToe},

function renderHub(){
  const g=$('grid');g.innerHTML='';
  const q=$('search').value.toLowerCase();
  GAMES.filter(x=>x.name.toLowerCase().includes(q)||x.cat.toLowerCase().includes(q)).forEach(gm=>{
    const c=el('div','card',`<div class="icon">${gm.icon}</div><div class="name">${gm.name}</div><div class="cat">${gm.cat}</div>`);
    c.onclick=()=>openModal(gm);
    g.appendChild(c);
  });
}
function filterGames(){renderHub()}

function openModal(gm){
  selGame=gm;selPlayers=0;
  $('modalTitle').textContent=gm.icon+' '+gm.name;
  $('modalDesc').textContent=gm.desc;
  const pb=$('playerBtns');pb.innerHTML='';
  for(let i=gm.min;i<=gm.max;i++){
    const b=el('button','pbtn',i);
    b.onclick=()=>{selPlayers=i;pb.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');$('goBtn').disabled=false};
    pb.appendChild(b);
  }
  $('goBtn').disabled=true;
  $('modalBg').classList.add('show');
}
$('modalBg').addEventListener('click',e=>{if(e.target===$('modalBg'))$('modalBg').classList.remove('show')});

function startGame(){
  $('modalBg').classList.remove('show');
  $('hub').style.display='none';
  $('gameArea').style.display='block';
  $('backBtn').style.display='block';
  scores=Array(selPlayers).fill(0);curPlayer=0;gameActive=true;
  selGame.init();
}
function goHome(){
  gameActive=false;
  $('hub').style.display='block';
  $('gameArea').style.display='none';
  $('backBtn').style.display='none';
  $('gameArea').innerHTML='';
}
function winScreen(msg){
  gameActive=false;
  const d=el('div','',`<div style="text-align:center;margin-top:30px"><h2 style="font-size:1.8rem;margin-bottom:10px">🏆 ${msg}</h2><button class="action-btn" onclick="selGame.init()">Play Again</button> <button class="action-btn secondary" onclick="goHome()">Back to Hub</button></div>`);
  $('gameArea').appendChild(d);
}
function getWinner(){let mx=Math.max(...scores);let wi=scores.reduce((a,v,i)=>v===mx?[...a,i]:a,[]);return wi.length===1?PN[wi[0]]:'Tie!';}

// === QUIZ ENGINE (shared by all quiz games) ===
function initQuizGame(title,questions){
  const ga=$('gameArea');ga.innerHTML='';
  scores=Array(selPlayers).fill(0);curPlayer=0;
  let qi=0;const qs=shuffle([...questions]).slice(0,10);
  ga.appendChild(el('h2','',title));
  ga.appendChild(el('div','turn-info',''));
  ga.appendChild(makeScoreboard());
  const board=el('div','game-board');ga.appendChild(board);
  function showQ(){
    if(qi>=qs.length){winScreen(getWinner()+' wins!');return}
    board.innerHTML='';highlightPlayer();turnInfo(`${PN[curPlayer]}'s turn — Question ${qi+1}/${qs.length}`);
    const q=qs[qi];
    board.appendChild(el('div','',`<p style="font-size:1.2rem;margin:15px 0;text-align:center">${q.q}</p>`));
    const opts=el('div','',);opts.style.cssText='display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px';
    q.o.forEach((o,i)=>{
      const b=el('button','action-btn',o);
      b.style.background=i%2===0?'linear-gradient(135deg,#00d4ff,#7b2ff7)':'linear-gradient(135deg,#7b2ff7,#ff6b6b)';
      b.onclick=()=>{
        if(i===q.a){updateScore(curPlayer,scores[curPlayer]+1);board.innerHTML=`<p style="color:#4cff91;font-size:1.3rem;text-align:center">✅ Correct! +1 point</p>`}
        else{board.innerHTML=`<p style="color:#ff6b6b;font-size:1.3rem;text-align:center">❌ Wrong! Answer: ${q.o[q.a]}</p>`}
        qi++;nextPlayer();setTimeout(showQ,1500);
      };
      opts.appendChild(b);
    });
    board.appendChild(opts);
  }
  showQ();
}

// =================== GAME IMPLEMENTATIONS ===================

// 1. Tic Tac Toe
function initTicTacToe(){
  const ga=$('gameArea');ga.innerHTML='';scores=[0,0];curPlayer=0;
  const marks=['X','O'];
  let state=Array(9).fill('');
  ga.appendChild(el('h2','','Tic Tac Toe'));
  ga.appendChild(el('div','turn-info',''));
  ga.appendChild(makeScoreboard());
  const board=el('div','game-board');ga.appendChild(board);
  const grid=el('div','');grid.style.cssText='display:grid;grid-template-columns:repeat(3,90px);gap:6px';
  board.appendChild(grid);
  const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  function render(){
    grid.innerHTML='';highlightPlayer();turnInfo(`${PN[curPlayer]}'s turn (${marks[curPlayer]})`);
    for(let i=0;i<9;i++){
      const c=el('div','',state[i]);
      c.style.cssText=`width:90px;height:90px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:700;background:rgba(255,255,255,.08);border-radius:12px;cursor:pointer;color:${state[i]==='X'?PC[0]:PC[1]}`;
      if(!state[i])c.onclick=()=>{state[i]=marks[curPlayer];const w=wins.find(c=>c.every(j=>state[j]===marks[curPlayer]));if(w){updateScore(curPlayer,scores[curPlayer]+1);render();turnInfo(`${PN[curPlayer]} wins!`);setTimeout(()=>winScreen(`${PN[curPlayer]} wins!`),1000);return}if(state.every(x=>x)){render();turnInfo("It's a draw!");setTimeout(()=>winScreen("It's a draw!"),1000);return}nextPlayer();render()};
      grid.appendChild(c);
    }
  }
  render();
}

// 2. Connect Four
function initConnectFour(){
  const ga=$('gameArea');ga.innerHTML='';scores=[0,0];curPlayer=0;
  const R=6,C=7;let grid=Array.from({length:R},()=>Array(C).fill(-1));let done=false;
  ga.appendChild(el('h2','','Connect Four'));
  ga.appendChild(el('div','turn-info',''));
  ga.appendChild(makeScoreboard());
  const board=el('div','game-board');ga.appendChild(board);
  const tbl=el('div','');tbl.style.cssText='display:grid;grid-template-columns:repeat(7,55px);gap:4px';board.appendChild(tbl);
  function check(r,c,dr,dc){const p=grid[r][c];if(p<0)return false;for(let i=1;i<4;i++){const nr=r+dr*i,nc=c+dc*i;if(nr<0||nr>=R||nc<0||nc>=C||grid[nr][nc]!==p)return false}return true}
  function hasWin(){for(let r=0;r<R;r++)for(let c=0;c<C;c++)for(const[dr,dc]of[[0,1],[1,0],[1,1],[1,-1]])if(check(r,c,dr,dc))return grid[r][c];return-1}
  function render(){
    tbl.innerHTML='';highlightPlayer();turnInfo(`${PN[curPlayer]}'s turn`);
    for(let r=0;r<R;r++)for(let c=0;c<C;c++){
      const cell=el('div','');
      cell.style.cssText=`width:55px;height:55px;border-radius:50%;background:${grid[r][c]>=0?PC[grid[r][c]]:'rgba(255,255,255,.08)'};cursor:pointer;transition:background .2s`;
      const cc=c;
      cell.onclick=()=>{if(done)return;for(let rr=R-1;rr>=0;rr--)if(grid[rr][cc]<0){grid[rr][cc]=curPlayer;const w=hasWin();if(w>=0){done=true;updateScore(w,scores[w]+1);render();turnInfo(`${PN[w]} wins!`);setTimeout(()=>winScreen(`${PN[w]} wins!`),1200);return}if(grid.every(row=>row.every(v=>v>=0))){done=true;render();setTimeout(()=>winScreen("It's a draw!"),1000);return}nextPlayer();render();return}};
      tbl.appendChild(cell);
    }
  }
  render();
}

// 3. Memory Match
function initMemory(){
  const ga=$('gameArea');ga.innerHTML='';scores=Array(selPlayers).fill(0);curPlayer=0;
  const syms=['🍎','🍊','🍋','🍇','🍉','🍓','🫐','🥝','🍑','🥭','🍍','🥥','🍌','🍒','🥑','🍆','🌽','🥕'];
  const n=8;const cards=shuffle([...syms.slice(0,n),...syms.slice(0,n)]);
  let revealed=Array(cards.length).fill(false),flipped=[],busy=false;
  ga.appendChild(el('h2','','Memory Match'));
  ga.appendChild(el('div','turn-info',''));
  ga.appendChild(makeScoreboard());
  const board=el('div','game-board');ga.appendChild(board);
  const grid=el('div','');grid.style.cssText='display:grid;grid-template-columns:repeat(4,75px);gap:8px';board.appendChild(grid);
  function render(){
    grid.innerHTML='';highlightPlayer();turnInfo(`${PN[curPlayer]}'s turn`);
    cards.forEach((s,i)=>{
      const c=el('div','',revealed[i]?s:'?');
      c.style.cssText=`width:75px;height:75px;display:flex;align-items:center;justify-content:center;font-size:${revealed[i]?'2rem':'1.5rem'};background:${revealed[i]?'rgba(255,255,255,.15)':'rgba(255,255,255,.06)'};border-radius:12px;cursor:pointer;border:2px solid ${revealed[i]?'#7b2ff7':'transparent'}`;
      if(!revealed[i]&&!busy)c.onclick=()=>{
        if(flipped.length>=2||flipped.includes(i))return;
        revealed[i]=true;flipped.push(i);render();
        if(flipped.length===2){
          busy=true;
          setTimeout(()=>{
            if(cards[flipped[0]]===cards[flipped[1]]){updateScore(curPlayer,scores[curPlayer]+1)}
            else{revealed[flipped[0]]=false;revealed[flipped[1]]=false;nextPlayer()}
            flipped=[];busy=false;
            if(revealed.every(x=>x)){winScreen(getWinner()+' wins!')}else render();
          },800);
        }
      };
      grid.appendChild(c);
    });
  }
  render();
}

// 6. Rock Paper Scissors
function initRPS(){
  const ga=$('gameArea');ga.innerHTML='';scores=[0,0];let round=0,maxR=5;
  const opts=['🪨 Rock','📄 Paper','✂️ Scissors'];
  ga.appendChild(el('h2','','Rock Paper Scissors'));
  ga.appendChild(el('div','turn-info',''));
  ga.appendChild(makeScoreboard());
  const board=el('div','game-board');ga.appendChild(board);
  let choices=[];
  function doRound(){
    if(round>=maxR){winScreen(getWinner()+' wins!');return}
    round++;choices=[];askPlayer(0);
  }
  function askPlayer(p){
    board.innerHTML='';turnInfo(`Round ${round}/${maxR} — ${PN[p]}, choose! (other player look away)`);
    opts.forEach((o,i)=>{
      const b=el('button','action-btn',o);b.onclick=()=>{choices.push(i);if(choices.length<2)askPlayer(1);else resolve()};board.appendChild(b);
    });
  }
  function resolve(){
    const[a,b]=choices;
    let msg;
    if(a===b)msg="It's a tie!";
    else if((a===0&&b===2)||(a===1&&b===0)||(a===2&&b===1)){updateScore(0,scores[0]+1);msg=`${PN[0]} wins this round!`}
    else{updateScore(1,scores[1]+1);msg=`${PN[1]} wins this round!`}
    board.innerHTML=`<p style="font-size:1.3rem;text-align:center">${PN[0]}: ${opts[a]} vs ${PN[1]}: ${opts[b]}<br>${msg}</p>`;
    const nb=el('button','action-btn','Next Round →');nb.onclick=doRound;board.appendChild(nb);
  }
  doRound();
}

// 23. Blackjack
function initBlackjack(){
  const ga=$('gameArea');ga.innerHTML='';scores=Array(selPlayers).fill(0);curPlayer=0;
  ga.appendChild(el('h2','','Blackjack'));ga.appendChild(el('div','turn-info',''));ga.appendChild(makeScoreboard());
  const board=el('div','game-board');ga.appendChild(board);
  let hands,done;
  function deal(){hands=Array.from({length:selPlayers},()=>[rand(1,10),rand(1,10)]);done=Array(selPlayers).fill(false);curPlayer=0;doTurn()}
  function handVal(h){return h.reduce((a,b)=>a+b,0)}
  function doTurn(){
    if(done.every(x=>x)){resolve();return}
    if(done[curPlayer]){curPlayer=(curPlayer+1)%selPlayers;doTurn();return}
    highlightPlayer();const v=handVal(hands[curPlayer]);
    turnInfo(`${PN[curPlayer]}'s turn — Hand: ${hands[curPlayer].join('+')} = ${v}`);
    board.innerHTML=`<p style="font-size:2rem;margin:20px">🃏 ${hands[curPlayer].join(' + ')} = ${v}</p>`;
    if(v>=21){done[curPlayer]=true;if(v>21)board.innerHTML+=`<p style="color:#ff6b6b">Bust!</p>`;curPlayer=(curPlayer+1)%selPlayers;setTimeout(doTurn,1000);return}
    const hb=el('button','action-btn','🃏 Hit');const sb=el('button','action-btn secondary','✋ Stand');
    hb.onclick=()=>{hands[curPlayer].push(rand(1,10));doTurn()};
    sb.onclick=()=>{done[curPlayer]=true;curPlayer=(curPlayer+1)%selPlayers;doTurn()};
    board.appendChild(hb);board.appendChild(sb);
  }
  function resolve(){
    let best=-1,wi=-1;
    hands.forEach((h,i)=>{const v=handVal(h);if(v<=21&&v>best){best=v;wi=i}});
    if(wi>=0)updateScore(wi,scores[wi]+1);
    let html='<div style="display:flex;gap:15px;flex-wrap:wrap;justify-content:center;margin:20px">';
    hands.forEach((h,i)=>{const v=handVal(h);html+=`<div style="padding:15px;background:rgba(255,255,255,.08);border-radius:12px;border:2px solid ${i===wi?PC[i]:'#333'};text-align:center"><div style="color:${PC[i]};font-weight:700">${PN[i]}</div><div style="font-size:1.5rem">${v}${v>21?' 💥':''}</div>${i===wi?'👑':''}</div>`});
    html+='</div>';
    board.innerHTML=html;
    const nb=el('button','action-btn','Deal Again');nb.onclick=deal;board.appendChild(nb);
    const hb=el('button','action-btn secondary','End Game');hb.onclick=()=>winScreen(getWinner()+' wins!');board.appendChild(hb);
  }
  deal();
}

// 41. Dice Poker
function initDicePoker(){
  const ga=$('gameArea');ga.innerHTML='';scores=Array(selPlayers).fill(0);let round=0,maxR=5;
  ga.appendChild(el('h2','','Dice Poker'));ga.appendChild(el('div','turn-info',''));ga.appendChild(makeScoreboard());
  const board=el('div','game-board');ga.appendChild(board);
  function scoreHand(dice){
    const counts={};dice.forEach(d=>counts[d]=(counts[d]||0)+1);const vals=Object.values(counts).sort((a,b)=>b-a);
    if(vals[0]===5)return{s:50,n:'Five of a Kind!'};if(vals[0]===4)return{s:40,n:'Four of a Kind'};
    if(vals[0]===3&&vals[1]===2)return{s:35,n:'Full House'};const sorted=[...dice].sort();
    if(sorted.join('')==='12345'||sorted.join('')==='23456')return{s:30,n:'Straight'};
    if(vals[0]===3)return{s:25,n:'Three of a Kind'};if(vals[0]===2&&vals[1]===2)return{s:20,n:'Two Pairs'};
    if(vals[0]===2)return{s:10,n:'One Pair'};return{s:dice.reduce((a,b)=>a+b),n:'High Card'};
  }
  function doRound(){
    if(round>=maxR){winScreen(getWinner()+' wins!');return}
    round++;turnInfo(`Round ${round}/${maxR}`);board.innerHTML='';
    const b=el('button','action-btn','🎲 Roll All Hands!');
    b.onclick=()=>{
      let html='';let best=-1,wi=-1;
      for(let i=0;i<selPlayers;i++){
        const dice=Array.from({length:5},()=>rand(1,6));const h=scoreHand(dice);
        if(h.s>best){best=h.s;wi=i}
        html+=`<div style="margin:8px;padding:10px;background:rgba(255,255,255,.06);border-radius:12px;border:2px solid ${PC[i]}"><span style="color:${PC[i]};font-weight:700">${PN[i]}</span>: 🎲${dice.join(' ')} — ${h.n} (${h.s}pts)</div>`;
      }
      updateScore(wi,scores[wi]+1);
      board.innerHTML=html+`<p style="color:#4cff91;margin:10px">${PN[wi]} wins the round!</p>`;
      const nb=el('button','action-btn','Next →');nb.onclick=doRound;board.appendChild(nb);
    };
    board.appendChild(b);
  }
  doRound();
}

function initDotsBoxes(){
  const ga=$('gameArea');ga.innerHTML='';scores=Array(selPlayers).fill(0);curPlayer=0;
  const R=3,C=3;
  const hLines=Array.from({length:R+1},()=>Array(C).fill(-1));
  const vLines=Array.from({length:R},()=>Array(C+1).fill(-1));
  const boxes=Array.from({length:R},()=>Array(C).fill(-1));
  ga.appendChild(el('h2','','Dots & Boxes'));ga.appendChild(el('div','turn-info',''));ga.appendChild(makeScoreboard());
  const board=el('div','game-board');ga.appendChild(board);
  function checkBoxes(){
    let scored=false;
    for(let r=0;r<R;r++)for(let c=0;c<C;c++){
      if(boxes[r][c]<0&&hLines[r][c]>=0&&hLines[r+1][c]>=0&&vLines[r][c]>=0&&vLines[r][c+1]>=0){
        boxes[r][c]=curPlayer;updateScore(curPlayer,scores[curPlayer]+1);scored=true;
      }
    }
    return scored;
  }
  function render(){
    highlightPlayer();turnInfo(`${PN[curPlayer]}'s turn`);
    board.innerHTML='';const tbl=el('div','');tbl.style.cssText='display:inline-block';
    for(let r=0;r<=R;r++){
      const hRow=el('div','');hRow.style.cssText='display:flex;align-items:center';
      for(let c=0;c<C;c++){
        hRow.appendChild(el('span','','●'));
        const line=el('span','',hLines[r][c]>=0?'━━━':'···');
        line.style.cssText=`cursor:${hLines[r][c]<0?'pointer':'default'};color:${hLines[r][c]>=0?PC[hLines[r][c]]:'#555'};font-size:1.2rem;margin:0 2px;font-family:monospace`;
        if(hLines[r][c]<0){const rr=r,cc=c;line.onclick=()=>{hLines[rr][cc]=curPlayer;if(!checkBoxes())nextPlayer();render();if(boxes.every(row=>row.every(v=>v>=0)))winScreen(getWinner()+' wins!')}}
        hRow.appendChild(line);
      }
      hRow.appendChild(el('span','','●'));tbl.appendChild(hRow);
      if(r<R){
        const vRow=el('div','');vRow.style.cssText='display:flex;align-items:center';
        for(let c=0;c<=C;c++){
          const line=el('span','',vLines[r][c]>=0?'┃':' ¦');
          line.style.cssText=`cursor:${vLines[r][c]<0?'pointer':'default'};color:${vLines[r][c]>=0?PC[vLines[r][c]]:'#555'};font-size:1.2rem;width:20px;text-align:center;font-family:monospace`;
          if(vLines[r][c]<0){const rr=r,cc=c;line.onclick=()=>{vLines[rr][cc]=curPlayer;if(!checkBoxes())nextPlayer();render();if(boxes.every(row=>row.every(v=>v>=0)))winScreen(getWinner()+' wins!')}}
          vRow.appendChild(line);
          if(c<C){const box=el('span','',boxes[r][c]>=0?PN[boxes[r][c]][0]:' ');box.style.cssText=`width:30px;text-align:center;color:${boxes[r][c]>=0?PC[boxes[r][c]]:'transparent'};font-weight:700`;vRow.appendChild(box)}
        }
        tbl.appendChild(vRow);
      }
    }
    board.appendChild(tbl);
  }
  render();
}

function initTreasureHunt(){
  const ga=$('gameArea');ga.innerHTML='';scores=Array(selPlayers).fill(0);curPlayer=0;
  const S=5;const grid=Array.from({length:S},()=>Array(S).fill(0));
  const treasures=rand(3,5);for(let i=0;i<treasures;i++){let r,c;do{r=rand(0,S-1);c=rand(0,S-1)}while(grid[r][c]);grid[r][c]=1}
  let revealed=Array.from({length:S},()=>Array(S).fill(false));
  ga.appendChild(el('h2','','Treasure Hunt'));ga.appendChild(el('div','turn-info',''));ga.appendChild(makeScoreboard());
  const board=el('div','game-board');ga.appendChild(board);

    highlightPlayer();turnInfo(`${PN[curPlayer]}'s turn — Find the treasure! 💎`);
    board.innerHTML='';const g=el('div','');g.style.cssText=`display:grid;grid-template-columns:repeat(${S},60px);gap:4px`;
    for(let r=0;r<S;r++)for(let c=0;c<S;c++){
      const cell=el('div','',revealed[r][c]?(grid[r][c]?'💎':'💨'):'❓');
      cell.style.cssText=`width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:${revealed[r][c]?'rgba(255,255,255,.1)':'rgba(255,255,255,.05)'};border-radius:10px;cursor:${revealed[r][c]?'default':'pointer'}`;
      if(!revealed[r][c]){const rr=r,cc=c;cell.onclick=()=>{
        revealed[rr][cc]=true;
        if(grid[rr][cc]){updateScore(curPlayer,scores[curPlayer]+1)}
        else nextPlayer();
        let allFound=true;for(let i=0;i<S;i++)for(let j=0;j<S;j++)if(grid[i][j]&&!revealed[i][j])allFound=false;
        if(allFound){winScreen(getWinner()+' wins!')}else render();
      }}
      g.appendChild(cell);
    }
    board.appendChild(g);
  }
  render();
}

      else{board.innerHTML=`<p style="color:#ff6b6b;font-size:1.3rem">❌ Correct spelling: ${item.w}</p>`}
      nextPlayer();setTimeout(showQ,1500);
    };
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')b.click()});
    const row=el('div','');row.style.cssText='display:flex;gap:10px;justify-content:center;align-items:center';
    row.appendChild(inp);row.appendChild(b);board.appendChild(row);inp.focus();
  }
  showQ();
}

// 48. Hot Potato
function initHotPotato(){
  const ga=$('gameArea');ga.innerHTML='';let alive=Array.from({length:selPlayers},(_, i)=>i);
  ga.appendChild(el('h2','','Hot Potato'));ga.appendChild(el('div','turn-info',''));
  const board=el('div','game-board');ga.appendChild(board);
  let holder=0;
  function doRound(){
    if(alive.length<=1){winScreen(`${PN[alive[0]]} wins!`);return}
    const timer=rand(3000,8000);holder=0;
    turnInfo(`Pass the potato! 🥔`);render();
    setTimeout(()=>{
      const out=alive[holder%alive.length];
      board.innerHTML=`<p style="color:#ff6b6b;font-size:1.5rem">💥 ${PN[out]} is out!</p>`;
      alive=alive.filter(x=>x!==out);
      const nb=el('button','action-btn','Next Round →');nb.onclick=doRound;board.appendChild(nb);
    },timer);
  }
  function render(){
    board.innerHTML='';
    const cur=alive[holder%alive.length];
    board.appendChild(el('div','',`<p style="font-size:3rem;margin:20px">🥔</p><p style="font-size:1.3rem;color:${PC[cur]}">${PN[cur]} has the potato!</p>`));
    const b=el('button','action-btn','👉 Pass!');
    b.onclick=()=>{holder++;render()};
    board.appendChild(b);
    const players=el('div','');players.style.cssText='display:flex;gap:10px;margin-top:15px;flex-wrap:wrap;justify-content:center';
    alive.forEach((p,i)=>{
      const d=el('div','',`${PN[p]} ${i===holder%alive.length?'🥔':''}`);
      d.style.cssText=`padding:8px 14px;border-radius:12px;background:${PC[p]}33;border:2px solid ${PC[p]};font-weight:600`;
      players.appendChild(d);
    });
    board.appendChild(players);
  }
  doRound();
}

// 49. Bingo
function initBingo(){
  const ga=$('gameArea');ga.innerHTML='';scores=Array(selPlayers).fill(0);curPlayer=0;
  const S=5;let boards=Array.from({length:selPlayers},()=>{
    const nums=shuffle(Array.from({length:25},(_, i)=>i+1));
    return{nums,marked:Array(25).fill(false)};
  });
  let called=[],pool=shuffle(Array.from({length:50},(_, i)=>i+1));
  ga.appendChild(el('h2','','Bingo'));ga.appendChild(el('div','turn-info',''));
  const board=el('div','game-board');ga.appendChild(board);
  function checkWin(b){
    const m=b.marked;
    for(let r=0;r<S;r++){if(m.slice(r*S,r*S+S).every(x=>x))return true}
    for(let c=0;c<S;c++){let col=true;for(let r=0;r<S;r++)if(!m[r*S+c])col=false;if(col)return true}
    let d1=true,d2=true;for(let i=0;i<S;i++){if(!m[i*S+i])d1=false;if(!m[i*S+(S-1-i)])d2=false}
    return d1||d2;
  }
  function render(){
    board.innerHTML='';turnInfo(`Called: ${called.length} numbers`);
    const cb=el('button','action-btn','📢 Call Number!');
    cb.onclick=()=>{
      if(pool.length===0)return;
      const num=pool.pop();called.push(num);
      boards.forEach(b=>{const idx=b.nums.indexOf(num);if(idx>=0)b.marked[idx]=true});
      for(let i=0;i<selPlayers;i++){if(checkWin(boards[i])){winScreen(`🎉 ${PN[i]} gets BINGO!`);return}}
      render();
    };
    board.appendChild(cb);
    board.appendChild(el('div','',`<p style="margin:10px;font-size:1.1rem">Last called: ${called.length?called[called.length-1]:'—'}</p>`));
    for(let p=0;p<selPlayers;p++){
      const pg=el('div','',`<div style="color:${PC[p]};font-weight:700;margin:10px 0 5px">${PN[p]}'s Board</div>`);
      const g=el('div','');g.style.cssText=`display:grid;grid-template-columns:repeat(5,40px);gap:3px;margin-bottom:10px`;
      boards[p].nums.forEach((n,i)=>{
        const c=el('div','',n);c.style.cssText=`width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:.85rem;background:${boards[p].marked[i]?PC[p]+'66':'rgba(255,255,255,.06)'};border-radius:6px;font-weight:${boards[p].marked[i]?'700':'400'}`;
        g.appendChild(c);
      });
      pg.appendChild(g);board.appendChild(pg);
    }
  }
  render();
}

// 50. Reflex Battle
function initReflex(){
  const ga=$('gameArea');ga.innerHTML='';scores=Array(selPlayers).fill(0);let round=0,maxR=5;
  const keys='QWERTASDFG'.split('');
  ga.appendChild(el('h2','','Reflex Battle'));ga.appendChild(el('div','turn-info',''));ga.appendChild(makeScoreboard());
  const board=el('div','game-board');ga.appendChild(board);
  function doRound(){
    if(round>=maxR){winScreen(getWinner()+' wins!');return}
    round++;turnInfo(`Round ${round}/${maxR} — Get ready...`);
    board.innerHTML=`<p style="font-size:1.5rem;margin:20px">Wait for it...</p>`;
    const delay=rand(2000,5000);
    setTimeout(()=>{
      const target=keys[rand(0,keys.length-1)];
      board.innerHTML=`<p style="font-size:3rem;margin:20px;color:#4cff91">Press: ${target}</p>`;
      const start=Date.now();let won=false;
      function handler(e){
        if(won)return;
        if(e.key.toUpperCase()===target){
          won=true;document.removeEventListener('keydown',handler);
          const ms=Date.now()-start;
          board.innerHTML=`<p style="font-size:1.3rem">First press: ${ms}ms! But who pressed it?</p>`;
          const btns=el('div','');btns.style.cssText='display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:15px';
          for(let i=0;i<selPlayers;i++){
            const b=el('button','action-btn',PN[i]);b.style.background=PC[i]+'cc';
            b.onclick=()=>{updateScore(i,scores[i]+1);const nb=el('button','action-btn','Next →');nb.onclick=doRound;board.innerHTML=`<p style="color:${PC[i]};font-size:1.3rem">${PN[i]} gets the point!</p>`;board.appendChild(nb)};
            btns.appendChild(b);
          }
          board.appendChild(btns);
        }
      }
      document.addEventListener('keydown',handler);
    },delay);
  }
  doRound();
}

// 51. Addition Race
function initAdditionRace(){
  const ga=$('gameArea');ga.innerHTML='';scores=Array(selPlayers).fill(0);curPlayer=0;let qi=0,maxQ=10;
  ga.appendChild(el('h2','','Addition Race'));ga.appendChild(el('div','turn-info',''));ga.appendChild(makeScoreboard());
  const board=el('div','game-board');ga.appendChild(board);
  function showQ(){
    if(qi>=maxQ){winScreen(getWinner()+' wins!');return}
    qi++;const nums=[rand(10,99),rand(10,99),rand(10,99)];const ans=nums.reduce((a,b)=>a+b);
    highlightPlayer();turnInfo(`${PN[curPlayer]}'s turn — Q${qi}/${maxQ}`);
    board.innerHTML=`<p style="font-size:2rem;margin:20px">${nums.join(' + ')} = ?</p>`;
    const inp=el('input','','');inp.type='number';inp.style.cssText='padding:10px;font-size:1.2rem;border-radius:12px;border:2px solid #444;background:#111;color:#fff;width:120px;text-align:center';
    const b=el('button','action-btn','Submit');
    b.onclick=()=>{
      if(parseInt(inp.value)===ans){updateScore(curPlayer,scores[curPlayer]+1);board.innerHTML=`<p style="color:#4cff91;font-size:1.3rem">✅ Correct!</p>`}
      else{board.innerHTML=`<p style="color:#ff6b6b;font-size:1.3rem">❌ Answer: ${ans}</p>`}
      nextPlayer();setTimeout(showQ,1200);
    };
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')b.click()});
    const row=el('div','');row.style.cssText='display:flex;gap:10px;justify-content:center;align-items:center';
    row.appendChild(inp);row.appendChild(b);board.appendChild(row);inp.focus();
  }
  showQ();
}

// 52. Ludo Race
function initLudoRace(){
  const ga=$('gameArea');ga.innerHTML='';scores=Array(selPlayers).fill(0);curPlayer=0;
  const FINISH=30;let pos=Array(selPlayers).fill(0);
  const specials={};for(let i=0;i<5;i++){specials[rand(3,27)]=rand(-3,5)}
  ga.appendChild(el('h2','','Ludo Race'));ga.appendChild(el('div','turn-info',''));ga.appendChild(makeScoreboard());
  const board=el('div','game-board');ga.appendChild(board);
  function render(){
    highlightPlayer();turnInfo(`${PN[curPlayer]}'s turn!`);
    board.innerHTML='';
    const track=el('div','');track.style.cssText='display:flex;flex-wrap:wrap;gap:3px;max-width:500px;justify-content:center;margin:15px';
    for(let i=0;i<=FINISH;i++){
      const sq=el('div','',i===FINISH?'🏁':(specials[i]?'⭐':''));
      let occupants='';for(let p=0;p<selPlayers;p++)if(pos[p]===i)occupants+=`<span style="color:${PC[p]}">●</span>`;
      sq.innerHTML+=occupants;
      sq.style.cssText=`width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:.8rem;background:rgba(255,255,255,.06);border-radius:6px`;
      track.appendChild(sq);
    }
    board.appendChild(track);
    const b=el('button','action-btn','🎲 Roll!');
    b.onclick=()=>{
      const r=rand(1,6);pos[curPlayer]=Math.min(pos[curPlayer]+r,FINISH);
      let msg=`🎲 ${r}! `;
      if(specials[pos[curPlayer]]){const bonus=specials[pos[curPlayer]];pos[curPlayer]=Math.max(0,Math.min(pos[curPlayer]+bonus,FINISH));msg+=bonus>0?`⭐ Bonus +${bonus}!`:`💥 Setback ${bonus}!`}
      if(pos[curPlayer]>=FINISH){updateScore(curPlayer,1);board.innerHTML=`<p style="font-size:1.3rem">${msg}</p>`;winScreen(`🏁 ${PN[curPlayer]} finishes first!`);return}
      board.innerHTML=`<p style="font-size:1.1rem;margin:10px">${msg}</p>`;nextPlayer();setTimeout(render,1000);
    };
    board.appendChild(b);
  }
  render();
}
